name: Backup Selective Deployment (File / Folder) 

on:
  push:
    branches:
      - development
      - qatest
      - uat
  workflow_dispatch:
    inputs:
      env:
        description: "Environment to deploy"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - qa
          - uat
          - prod

      source_path:
        description: "Source file or folder"
        required: true
        type: string

      destination_path:
        description: "Destination path on server"
        required: true
        type: string

      rollback_version:
        description: "Optional rollback version"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Detect Environment
        id: envdetect
        run: |
          BRANCH="${GITHUB_REF##*/}"

          if [[ "$BRANCH" == "development" ]]; then
            echo "env=dev" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "qatest" ]]; then
            echo "env=qa" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "uat" ]]; then
            echo "env=uat" >> $GITHUB_OUTPUT
          else
            echo "env=${{ github.event.inputs.env }}" >> $GITHUB_OUTPUT
          fi

      - name: Select Server
        id: vars
        run: |
          ENV="${{ steps.envdetect.outputs.env }}"

          if [[ "$ENV" == "dev" ]]; then
            echo "server=${{ secrets.DEV_SERVER }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "qa" ]]; then
            echo "server=${{ secrets.QA_SERVER }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "uat" ]]; then
            echo "server=${{ secrets.UAT_SERVER }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "prod" ]]; then
            echo "server=${{ secrets.PROD_SERVER }}" >> $GITHUB_OUTPUT
          fi

      - name: Set Release Version
        id: release
        run: |
          VERSION=$(date +"%Y%m%d%H%M%S")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Destination Directories
        run: |
          SERVER="${{ steps.vars.outputs.server }}"
          USER="${{ secrets.SERVER_USER }}"
          PASS="${{ secrets.SERVER_PASSWORD }}"
          BASE="${{ github.event.inputs.destination_path }}"
          RELEASES="$BASE/releases"
          VERSION="${{ steps.release.outputs.version }}"
          NEW_RELEASE="$RELEASES/$VERSION"

          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "
            mkdir -p $NEW_RELEASE
            mkdir -p $RELEASES
          "

      - name: Deploy or Rollback
        run: |
          SERVER="${{ steps.vars.outputs.server }}"
          USER="${{ secrets.SERVER_USER }}"
          PASS="${{ secrets.SERVER_PASSWORD }}"
          BASE="${{ github.event.inputs.destination_path }}"
          RELEASES="$BASE/releases"
          VERSION="${{ steps.release.outputs.version }}"
          NEW_RELEASE="$RELEASES/$VERSION"
          ROLLBACK_VERSION="${{ github.event.inputs.rollback_version }}"
          ENV="${{ steps.envdetect.outputs.env }}"

          # NEW: Smart rollback folder
          ROLLBACK_BASE="/var/rollback/$ENV/release"

          if [ -n "$ROLLBACK_VERSION" ]; then
            echo "Manual rollback requested → version: $ROLLBACK_VERSION"

            sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "
              if [ ! -d $ROLLBACK_BASE/$ROLLBACK_VERSION ]; then
                echo 'ERROR: Rollback version $ROLLBACK_VERSION not found in $ROLLBACK_BASE'
                exit 1
              fi
              ln -sfn $ROLLBACK_BASE/$ROLLBACK_VERSION $BASE/current
            "
            echo "✅ Manual rollback completed"
            exit 0
          fi

          # NEW: Auto rollback to LAST version if user didn't provide one
          echo "No rollback version provided → AUTO rollback"

          LAST_VERSION=$(sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "
            [ -d $ROLLBACK_BASE ] && ls -1t $ROLLBACK_BASE | head -n 1
          ")

          if [ -z "$LAST_VERSION" ]; then
            echo "❌ No rollback version found in $ROLLBACK_BASE"
            exit 1
          fi

          echo "Auto rollback → Using latest version: $LAST_VERSION"

          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "
            ln -sfn $ROLLBACK_BASE/$LAST_VERSION $BASE/current
          "

          echo "✅ Auto rollback complete → version: $LAST_VERSION"

      - name: Clean Old Releases (Keep last 10)
        if: ${{ github.event.inputs.rollback_version == '' }}
        run: |
          SERVER="${{ steps.vars.outputs.server }}"
          USER="${{ secrets.SERVER_USER }}"
          PASS="${{ secrets.SERVER_PASSWORD }}"
          BASE="${{ github.event.inputs.destination_path }}"
          RELEASES="$BASE/releases"
          KEEP=10

          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "
            cd $RELEASES
            ls -1t | tail -n +$((KEEP+1)) | xargs -r rm -rf
          "
