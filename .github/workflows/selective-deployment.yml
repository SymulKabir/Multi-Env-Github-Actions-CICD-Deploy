name: Selective Deployment (File / Folder)

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment to deploy"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - qa
          - uat
          - prod

      source_path:
        description: "Source file or folder (e.g. dist/ or backend/app.js)"
        required: true
        type: string

      destination_path:
        description: "Destination path on server (e.g. /var/www/app/)"
        required: true
        type: string

      rollback_version:
        description: "Select rollback version (leave empty for normal deploy)"
        required: false
        type: choice
        options:
          - placeholder # will be replaced automatically

jobs:
  update_and_deploy:
    runs-on: ubuntu-latest

    steps:
      ################################################
      # 1️⃣ Checkout repo with PAT
      ################################################
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      ################################################
      # 2️⃣ Install sshpass
      ################################################
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      ################################################
      # 3️⃣ Detect Environment
      ################################################
      - name: Detect Environment
        id: envdetect
        run: |
          BRANCH="${GITHUB_REF##*/}"
          if [[ "$BRANCH" == "development" ]]; then
            echo "env=dev" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "qatest" ]]; then
            echo "env=qa" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "uat" ]]; then
            echo "env=uat" >> $GITHUB_OUTPUT
          else
            echo "env=${{ github.event.inputs.env }}" >> $GITHUB_OUTPUT

      ################################################
      # 4️⃣ Select Server
      ################################################
      - name: Select Server
        id: vars
        run: |
          ENV="${{ steps.envdetect.outputs.env }}"
          if [[ "$ENV" == "dev" ]]; then
            echo "server=${{ secrets.DEV_SERVER }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "qa" ]]; then
            echo "server=${{ secrets.QA_SERVER }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "uat" ]]; then
            echo "server=${{ secrets.UAT_SERVER }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "prod" ]]; then
            echo "server=${{ secrets.PROD_SERVER }}" >> $GITHUB_OUTPUT

      ################################################
      # 5️⃣ Fetch releases and update rollback dropdown
      ################################################
      - name: Fetch releases and update rollback dropdown
        run: |
          SERVER="${{ steps.vars.outputs.server }}"
          USER="${{ secrets.SERVER_USER }}"
          PASS="${{ secrets.SERVER_PASSWORD }}"
          BASE="${{ github.event.inputs.destination_path }}"
          RELEASES="$BASE/releases"
          WORKFLOW_FILE=".github/workflows/selective-deployment.yml"

          mkdir -p tmp_releases
          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "ls -1t $RELEASES" > tmp_releases/list.txt || echo ""

          VERSIONS=$(cat tmp_releases/list.txt | tr '\n' ',' | sed 's/,$//')
          OPTIONS=$(echo $VERSIONS | tr ',' '\n' | sed 's/^/          - /')

          awk -v options="$OPTIONS" '
            BEGIN {in_block=0}
            /^      rollback_version:/ {print; in_block=1; next}
            in_block && /^        type: choice/ {print; print "        options:\n" options; in_block=0; next}
            {print}
          ' $WORKFLOW_FILE > $WORKFLOW_FILE.tmp
          mv $WORKFLOW_FILE.tmp $WORKFLOW_FILE

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add $WORKFLOW_FILE
          git commit -m "Update rollback_version options [ci skip]" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git

      ################################################
      # 6️⃣ Set release version
      ################################################
      - name: Set Release Version
        id: release
        run: |
          VERSION=$(date +"%Y%m%d%H%M%S")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      ################################################
      # 7️⃣ Create Destination Directories
      ################################################
      - name: Create Destination Directories
        run: |
          SERVER="${{ steps.vars.outputs.server }}"
          USER="${{ secrets.SERVER_USER }}"
          PASS="${{ secrets.SERVER_PASSWORD }}"
          BASE="${{ github.event.inputs.destination_path }}"
          RELEASES="$BASE/releases"
          VERSION="${{ steps.release.outputs.version }}"
          NEW_RELEASE="$RELEASES/$VERSION"

          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "
            mkdir -p $NEW_RELEASE
            mkdir -p $RELEASES
          "

      ################################################
      # 8️⃣ Deploy or Rollback
      ################################################
      - name: Deploy or Rollback
        run: |
          SERVER="${{ steps.vars.outputs.server }}"
          USER="${{ secrets.SERVER_USER }}"
          PASS="${{ secrets.SERVER_PASSWORD }}"
          BASE="${{ github.event.inputs.destination_path }}"
          RELEASES="$BASE/releases"
          VERSION="${{ steps.release.outputs.version }}"
          NEW_RELEASE="$RELEASES/$VERSION"
          ROLLBACK_VERSION="${{ github.event.inputs.rollback_version }}"

          if [ -n "$ROLLBACK_VERSION" ]; then
            echo "Rollback mode → version: $ROLLBACK_VERSION"
            sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "
              if [ ! -d $RELEASES/$ROLLBACK_VERSION ]; then
                echo 'ERROR: Release $ROLLBACK_VERSION not found!'
                exit 1
              fi
              ln -sfn $RELEASES/$ROLLBACK_VERSION $BASE/current
            "
            echo "✅ Rollback complete → $ROLLBACK_VERSION"
          else
            SOURCE="${{ github.event.inputs.source_path }}"
            if [ -d "$SOURCE" ]; then
              echo "Deploying directory: $SOURCE"
              tar -czf - -C "$SOURCE" . | \
              sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER \
              "tar -xzf - -C $NEW_RELEASE"
            elif [ -f "$SOURCE" ]; then
              echo "Deploying file: $SOURCE"
              sshpass -p "$PASS" scp -o StrictHostKeyChecking=no "$SOURCE" $USER@$SERVER:"$NEW_RELEASE/"
            else
              echo "ERROR: Source path not found"
              exit 1
            fi

            sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "
              ln -sfn $NEW_RELEASE $BASE/current
            "
            echo "✅ Deployment complete → version: $VERSION"
          fi

      ################################################
      # 9️⃣ Clean old releases (keep last 10)
      ################################################
      - name: Clean Old Releases
        if: ${{ github.event.inputs.rollback_version == '' }}
        run: |
          SERVER="${{ steps.vars.outputs.server }}"
          USER="${{ secrets.SERVER_USER }}"
          PASS="${{ secrets.SERVER_PASSWORD }}"
          BASE="${{ github.event.inputs.destination_path }}"
          RELEASES="$BASE/releases"
          KEEP=10

          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "
            cd $RELEASES
            ls -1t | tail -n +$((KEEP+1)) | xargs -r rm -rf
          "
