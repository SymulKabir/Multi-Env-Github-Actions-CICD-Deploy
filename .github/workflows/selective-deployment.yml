name: Selective Deployment (Manual Destination)

on:
  push:
    branches:
      - development
      - qatest
      - uat

  workflow_dispatch:
    inputs:
      env:
        description: "Environment to deploy"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - qa
          - uat
          - prod

      source_path:
        description: "Source file/folder (repo path, e.g. dist/, backend/app.js)"
        required: true
        type: string

      destination_path:
        description: "Destination path on server (e.g. /var/www/app/)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Detect Environment
        id: envdetect
        run: |
          if [[ "${GITHUB_REF##*/}" == "development" ]]; then
            echo "env=dev" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF##*/}" == "qatest" ]]; then
            echo "env=qa" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF##*/}" == "uat" ]]; then
            echo "env=uat" >> $GITHUB_OUTPUT
          else
            echo "env=${{ github.event.inputs.env }}" >> $GITHUB_OUTPUT
          fi

      - name: Select Server
        id: vars
        run: |
          ENV="${{ steps.envdetect.outputs.env }}"

          if [[ "$ENV" == "dev" ]]; then
            echo "server=${{ secrets.DEV_SERVER }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "qa" ]]; then
            echo "server=${{ secrets.QA_SERVER }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "uat" ]]; then
            echo "server=${{ secrets.UAT_SERVER }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "prod" ]]; then
            echo "server=${{ secrets.PROD_SERVER }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Destination Directory
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.SERVER_USER }}@${{ steps.vars.outputs.server }} \
          "mkdir -p '${{ github.event.inputs.destination_path }}'"

      - name: Upload Selected File/Folder
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
          scp -o StrictHostKeyChecking=no -r \
          "${{ github.event.inputs.source_path }}" \
          ${{ secrets.SERVER_USER }}@${{ steps.vars.outputs.server }}:"${{ github.event.inputs.destination_path }}"

      - name: Rollback on Failure (QA/UAT/PROD)
        if: failure() && steps.envdetect.outputs.env != 'dev'
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no \
          ${{ secrets.SERVER_USER }}@${{ steps.vars.outputs.server }} \
          "
          echo 'Rollback skipped: selective deploy (no destructive change)'
          "
