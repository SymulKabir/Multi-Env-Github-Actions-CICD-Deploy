name: Selective Deployment / Rollback

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Deployment Environment"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - qa
          - uat
          - prod

      destination_path:
        description: "Destination path on server (required)"
        required: true
        type: string

      source_path:
        description: "Optional: Source file or folder to deploy"
        required: false
        type: string

      rollback_version:
        description: "Optional: version to rollback. If not provided, will take last version"
        required: false
        type: string

jobs:
  deploy_or_rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Detect environment
        id: envdetect
        run: |
          BRANCH="${GITHUB_REF##*/}"
          if [[ "$BRANCH" == "development" ]]; then
            echo "env=dev" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "qatest" ]]; then
            echo "env=qa" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "uat" ]]; then
            echo "env=uat" >> $GITHUB_OUTPUT
          else
            echo "env=${{ github.event.inputs.env }}" >> $GITHUB_OUTPUT

      - name: Select server
        id: vars
        run: |
          ENV="${{ steps.envdetect.outputs.env }}"
          if [[ "$ENV" == "dev" ]]; then
            echo "server=${{ secrets.DEV_SERVER }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "qa" ]]; then
            echo "server=${{ secrets.QA_SERVER }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "uat" ]]; then
            echo "server=${{ secrets.UAT_SERVER }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "prod" ]]; then
            echo "server=${{ secrets.PROD_SERVER }}" >> $GITHUB_OUTPUT

      - name: Deploy or Rollback
        run: |
          SERVER="${{ steps.vars.outputs.server }}"
          USER="${{ secrets.SERVER_USER }}"
          PASS="${{ secrets.SERVER_PASSWORD }}"
          BASE="${{ github.event.inputs.destination_path }}"
          SOURCE="${{ github.event.inputs.source_path }}"
          ENV="${{ steps.envdetect.outputs.env }}"
          ROLLBACK_BASE="/var/rollback/$ENV/release"
          ROLLBACK_VERSION="${{ github.event.inputs.rollback_version }}"

          # Decide mode: Deploy or Rollback
          if [ -z "$SOURCE" ]; then
            echo "🚀 Source not provided → Running Rollback"

            # Use input rollback_version if provided, else last version
            if [ -n "$ROLLBACK_VERSION" ]; then
              echo "Manual rollback → version: $ROLLBACK_VERSION"
              sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "
                if [ ! -d $ROLLBACK_BASE/$ROLLBACK_VERSION ]; then
                  echo '❌ Rollback version $ROLLBACK_VERSION not found!'
                  exit 1
                fi
                rsync -a --delete $ROLLBACK_BASE/$ROLLBACK_VERSION/ $BASE/
              "
            else
              echo "Auto rollback → using last version"
              LAST_VERSION=$(sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "
                [ -d $ROLLBACK_BASE ] && ls -1t $ROLLBACK_BASE | head -n 1
              ")
              if [ -z "$LAST_VERSION" ]; then
                echo "❌ No rollback version found in $ROLLBACK_BASE"
                exit 1
              fi
              echo "Auto rollback → version: $LAST_VERSION"
              sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "
                rsync -a --delete $ROLLBACK_BASE/$LAST_VERSION/ $BASE/
              "
            fi

            echo "✅ Rollback completed"
            exit 0
          fi

          # Deploy mode
          echo "📦 Deploying source → $SOURCE"
          VERSION=$(date +"%Y%m%d%H%M%S")
          DEST_DIR="$BASE/$VERSION"
          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "
            mkdir -p $DEST_DIR
          "
          if [ -d "$SOURCE" ]; then
            tar -czf - -C "$SOURCE" . | sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "tar -xzf - -C $DEST_DIR"
          elif [ -f "$SOURCE" ]; then
            sshpass -p "$PASS" scp -o StrictHostKeyChecking=no "$SOURCE" $USER@$SERVER:"$DEST_DIR/"
          fi

          echo "✅ Deployment completed → version: $VERSION"
