name: Selective Deployment (File / Folder)

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - qa
          - uat
          - prod

      source_path:
        description: "Source file or folder"
        required: true
        type: string

      destination_path:
        description: "Destination path on server"
        required: true
        type: string

      rollback_version:
        description: "Optional rollback version"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # Determine server by environment
      - name: Select Server
        id: vars
        run: |
          ENV="${{ github.event.inputs.env }}"

          if [[ "$ENV" == "dev" ]]; then
            echo "server=${{ secrets.DEV_SERVER }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "qa" ]]; then
            echo "server=${{ secrets.QA_SERVER }}" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "uat" ]]; then
            echo "server=${{ secrets.UAT_SERVER }}" >> $GITHUB_OUTPUT
          else
            echo "server=${{ secrets.PROD_SERVER }}" >> $GITHUB_OUTPUT
          fi

      - name: Set Release Version
        id: release
        run: |
          VERSION=$(date +"%Y%m%d%H%M%S")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ---------------------------
      # Upload → Copy → Store release in /var/rollback/<env>/release
      # ---------------------------
      - name: Upload and Deploy
        run: |
          SERVER="${{ steps.vars.outputs.server }}"
          USER="${{ secrets.SERVER_USER }}"
          PASS="${{ secrets.SERVER_PASSWORD }}"
          SRC="${{ github.event.inputs.source_path }}"
          DEST="${{ github.event.inputs.destination_path }}"
          ENV="${{ github.event.inputs.env }}"
          VERSION="${{ steps.release.outputs.version }}"
          ROLLBACK_VERSION="${{ github.event.inputs.rollback_version }}"

          ROLLBACK_BASE="/var/rollback/$ENV/release"

          # Create rollback directory
          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "mkdir -p $ROLLBACK_BASE/$VERSION"

          # If rollback requested
          if [ -n "$ROLLBACK_VERSION" ]; then
            echo "♻ Manual rollback → $ROLLBACK_VERSION"

            sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "
              if [ ! -d $ROLLBACK_BASE/$ROLLBACK_VERSION ]; then
                echo 'Rollback version not found'
                exit 1
              fi

              rm -rf $DEST/*
              cp -r $ROLLBACK_BASE/$ROLLBACK_VERSION/* $DEST/
            "

            echo "✅ Manual rollback completed."
            exit 0
          fi

          # Upload new version
          echo "⬆ Uploading files..."
          sshpass -p "$PASS" scp -r -o StrictHostKeyChecking=no "$SRC" "$USER@$SERVER:$ROLLBACK_BASE/$VERSION/"

          # Deploy to destination
          echo "🚀 Deploying to target directory..."
          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "
            rm -rf $DEST/*
            cp -r $ROLLBACK_BASE/$VERSION/* $DEST/
          "

          echo "✅ Deployment completed."

      # ---------------------------
      # Clean rollback: keep last 10
      # ---------------------------
      - name: Cleanup Old Rollbacks
        run: |
          SERVER="${{ steps.vars.outputs.server }}"
          USER="${{ secrets.SERVER_USER }}"
          PASS="${{ secrets.SERVER_PASSWORD }}"
          ENV="${{ github.event.inputs.env }}"
          ROLLBACK_BASE="/var/rollback/$ENV/release"
          KEEP=10

          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$SERVER "
            cd $ROLLBACK_BASE
            ls -1t | tail -n +$((KEEP+1)) | xargs -r rm -rf
          "
